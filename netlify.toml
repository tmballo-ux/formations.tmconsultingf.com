# netlify.toml — Configuration de déploiement pour formations.tmconsultingf.com

[build]
  publish = "."

[[redirects]]
  from = "/formations-operations"
  to = "/formations.html#operations"
  status = 301

[[redirects]]
  from = "/formations-geomatique"
  to = "/formations.html#geomatique"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
